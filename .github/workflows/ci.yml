name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: BCI language lint
        run: pnpm lint:bci

      - name: Production build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: https://sunitha.sindhole.com
